services:
  postgres:
    image: postgres:16-alpine
    container_name: finapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finapp}
      POSTGRES_DB: ${POSTGRES_DB:-controle_financeiro}
    ports:
      - "5433:5432"
    volumes:
      - finapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finapp} -d ${POSTGRES_DB:-controle_financeiro}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finapp_pgdata:
